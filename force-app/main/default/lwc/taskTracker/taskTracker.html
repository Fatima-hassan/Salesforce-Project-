<template>
    <lightning-card title="Task Tracker" icon-name="standard:task">
        <div class="slds-p-around_medium">
            <div class="summary-grid">
                <div class="summary-box">
                    <p class="summary-label">Total</p>
                    <p class="summary-value">{totalCount}</p>
                </div>
                <div class="summary-box pending-box">
                    <p class="summary-label">Pending</p>
                    <p class="summary-value">{pendingCount}</p>
                </div>
                <div class="summary-box completed-box">
                    <p class="summary-label">Completed</p>
                    <p class="summary-value">{completedCount}</p>
                </div>
            </div>

            <div class="form-grid slds-m-top_medium">
                <lightning-input
                    label="Subject"
                    value={subject}
                    data-field="subject"
                    onchange={handleInputChange}
                    required
                ></lightning-input>
                <lightning-combobox
                    label="Status"
                    value={status}
                    options={statusOptions}
                    data-field="status"
                    onchange={handleInputChange}
                ></lightning-combobox>
                <lightning-combobox
                    label="Priority"
                    value={priority}
                    options={priorityOptions}
                    data-field="priority"
                    onchange={handleInputChange}
                ></lightning-combobox>
                <lightning-input
                    type="date"
                    label="Due Date"
                    value={dueDate}
                    data-field="dueDate"
                    onchange={handleInputChange}
                ></lightning-input>
            </div>

            <div class="slds-m-top_medium">
                <lightning-button
                    variant="brand"
                    label="Create Task"
                    onclick={handleCreateTask}
                ></lightning-button>
            </div>

            <div class="slds-m-top_medium">
                <lightning-input
                    type="checkbox"
                    label="Show Only Pending Tasks"
                    checked={showOnlyPending}
                    onchange={handlePendingToggle}
                ></lightning-input>
            </div>

            <div class="slds-m-top_large">
                <h3 class="section-title">Pending Tasks</h3>
                <template if:true={hasPendingTasks}>
                    <template for:each={pendingTasks} for:item="task">
                        <div key={task.Id} class={task.rowClass}>
                            <div>
                                <template if:true={task.isEditing}>
                                    <div class="edit-row">
                                        <lightning-input
                                            value={editingTaskName}
                                            data-editing-input="true"
                                            onchange={handleEditingNameChange}
                                            onkeydown={handleEditingKeydown}
                                            variant="label-hidden"
                                        ></lightning-input>
                                        <lightning-button
                                            label="Save"
                                            variant="brand"
                                            onclick={handleSaveTaskName}
                                        ></lightning-button>
                                        <lightning-button
                                            label="Cancel"
                                            variant="neutral"
                                            onclick={handleCancelEditing}
                                        ></lightning-button>
                                    </div>
                                </template>
                                <template if:false={task.isEditing}>
                                    <p
                                        class="task-subject editable-subject"
                                        tabindex="0"
                                        role="button"
                                        data-id={task.Id}
                                        data-subject={task.Subject}
                                        ondblclick={handleTaskNameActivate}
                                        onkeydown={handleTaskNameKeydown}
                                        title="Double-click or press Enter to edit task name"
                                    >
                                        {task.Subject}
                                        <template if:true={task.isRecentlyUpdated}>
                                            <span class="updated-indicator slds-m-left_x-small" role="status" aria-live="polite">
                                                <lightning-icon
                                                    icon-name="utility:check"
                                                    size="xx-small"
                                                    alternative-text="Updated"
                                                    title="Updated"
                                                ></lightning-icon>
                                                <span aria-hidden="true">Updated</span>
                                                <span class="slds-assistive-text">Task recently updated</span>
                                            </span>
                                        </template>
                                        <template if:true={task.isOverdue}>
                                            <span class="slds-badge overdue-badge slds-m-left_x-small">Overdue</span>
                                        </template>
                                    </p>
                                </template>
                                <p class="task-meta">
                                    Status: {task.Status} | Priority: {task.Priority} |
                                    <template if:true={task.isEditingDueDate}>
                                        <span class="inline-date-edit">
                                            Due:
                                            <lightning-input
                                                type="date"
                                                value={editingDueDateValue}
                                                data-editing-due-date-input="true"
                                                onchange={handleEditingDueDateChange}
                                                onkeydown={handleEditingDueDateKeydown}
                                                variant="label-hidden"
                                            ></lightning-input>
                                            <lightning-button
                                                label="Save"
                                                variant="brand"
                                                onclick={handleSaveDueDate}
                                            ></lightning-button>
                                            <lightning-button
                                                label="Cancel"
                                                variant="neutral"
                                                onclick={handleCancelDueDateEditing}
                                            ></lightning-button>
                                        </span>
                                    </template>
                                    <template if:false={task.isEditingDueDate}>
                                        <span
                                            class="editable-due-date"
                                            tabindex="0"
                                            role="button"
                                            data-id={task.Id}
                                            data-duedate={task.ActivityDate}
                                            onclick={handleDueDateActivate}
                                            ondblclick={handleDueDateActivate}
                                            onkeydown={handleDueDateKeydown}
                                            title="Click, double-click, or press Enter to edit due date"
                                        >
                                            Due: {task.dueDateDisplay}
                                        </span>
                                    </template>
                                </p>
                            </div>
                            <div class="task-actions">
                                <lightning-button
                                    label="Mark Complete"
                                    variant="success"
                                    data-id={task.Id}
                                    onclick={handleMarkCompleted}
                                ></lightning-button>
                                <lightning-button-icon
                                    icon-name="utility:delete"
                                    alternative-text="Delete Task"
                                    title="Delete Task"
                                    variant="border-filled"
                                    data-id={task.Id}
                                    onclick={handleDeleteTask}
                                ></lightning-button-icon>
                            </div>
                        </div>
                    </template>
                </template>
                <template if:false={hasPendingTasks}>
                    <p class="empty-msg">No pending tasks.</p>
                </template>
            </div>

            <template if:true={showCompletedSection}>
                <div class="slds-m-top_large slds-m-bottom_small">
                    <h3 class="section-title">Completed Tasks</h3>
                    <template if:true={hasCompletedTasks}>
                        <template for:each={completedTasks} for:item="task">
                            <div key={task.Id} class={task.rowClass}>
                                <div>
                                    <template if:true={task.isEditing}>
                                        <div class="edit-row">
                                            <lightning-input
                                                value={editingTaskName}
                                                data-editing-input="true"
                                                onchange={handleEditingNameChange}
                                                onkeydown={handleEditingKeydown}
                                                variant="label-hidden"
                                            ></lightning-input>
                                            <lightning-button
                                                label="Save"
                                                variant="brand"
                                                onclick={handleSaveTaskName}
                                            ></lightning-button>
                                            <lightning-button
                                                label="Cancel"
                                                variant="neutral"
                                                onclick={handleCancelEditing}
                                            ></lightning-button>
                                        </div>
                                    </template>
                                    <template if:false={task.isEditing}>
                                        <p
                                            class="task-subject editable-subject"
                                            tabindex="0"
                                            role="button"
                                            data-id={task.Id}
                                            data-subject={task.Subject}
                                            ondblclick={handleTaskNameActivate}
                                            onkeydown={handleTaskNameKeydown}
                                            title="Double-click or press Enter to edit task name"
                                        >
                                            {task.Subject}
                                            <template if:true={task.isRecentlyUpdated}>
                                                <span class="updated-indicator slds-m-left_x-small" role="status" aria-live="polite">
                                                    <lightning-icon
                                                        icon-name="utility:check"
                                                        size="xx-small"
                                                        alternative-text="Updated"
                                                        title="Updated"
                                                    ></lightning-icon>
                                                    <span aria-hidden="true">Updated</span>
                                                    <span class="slds-assistive-text">Task recently updated</span>
                                                </span>
                                            </template>
                                        </p>
                                    </template>
                                    <p class="task-meta">
                                        Status: {task.Status} | Priority: {task.Priority} |
                                        <template if:true={task.isEditingDueDate}>
                                            <span class="inline-date-edit">
                                                Due:
                                                <lightning-input
                                                    type="date"
                                                    value={editingDueDateValue}
                                                    data-editing-due-date-input="true"
                                                    onchange={handleEditingDueDateChange}
                                                    onkeydown={handleEditingDueDateKeydown}
                                                    variant="label-hidden"
                                                ></lightning-input>
                                                <lightning-button
                                                    label="Save"
                                                    variant="brand"
                                                    onclick={handleSaveDueDate}
                                                ></lightning-button>
                                                <lightning-button
                                                    label="Cancel"
                                                    variant="neutral"
                                                    onclick={handleCancelDueDateEditing}
                                                ></lightning-button>
                                            </span>
                                        </template>
                                        <template if:false={task.isEditingDueDate}>
                                            <span
                                                class="editable-due-date"
                                                tabindex="0"
                                                role="button"
                                                data-id={task.Id}
                                                data-duedate={task.ActivityDate}
                                                onclick={handleDueDateActivate}
                                                ondblclick={handleDueDateActivate}
                                                onkeydown={handleDueDateKeydown}
                                                title="Click, double-click, or press Enter to edit due date"
                                            >
                                                Due: {task.dueDateDisplay}
                                            </span>
                                        </template>
                                    </p>
                                </div>
                                <div class="task-actions">
                                    <lightning-button-icon
                                        icon-name="utility:delete"
                                        alternative-text="Delete Task"
                                        title="Delete Task"
                                        variant="border-filled"
                                        data-id={task.Id}
                                        onclick={handleDeleteTask}
                                    ></lightning-button-icon>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasCompletedTasks}>
                        <p class="empty-msg">No completed tasks yet.</p>
                    </template>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
